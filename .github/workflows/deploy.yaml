name: Deploy
on:
  push:
    branches:
      - release
  workflow_call:
    secrets:
      DEPLOY_TOKEN:
        description: 'PAT scoped to roma-js repositories'
        required: true
permissions: 
  contents: write
jobs:
  build-and-deploy:
    # prevents this action from running on forks
    if: github.repository == 'Roma-JS/roma-js-on-astro'
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-24.04
    env:
      HUSKY: '0'
      TZ: 'Europe/Rome'
      PUBLIC_SITE_URL: "https://romajs.org"
    steps:
      - name: Checkout 🛎️
        uses: 'actions/checkout@v5'
        with:
          fetch-depth: 0
          ref: 'release'
          token: ${{ secrets.DEPLOY_TOKEN }}
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Setup corepack
        run: |
          echo "Before: corepack version => $(corepack --version || echo 'not installed')"
          npm install -g corepack@latest
          echo "After : corepack version => $(corepack --version)"
          corepack enable
      - name: log node & package manager
        run: 'printf "node -> %s\npnpm -> %s"  "$(node -v)" "$(pnpm -v)"'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build

      - name: Post build actions
        run: touch ./dist/.nojekyll # Avoids 404 when pathname includes underscores

      - name: Deploy roma-js site 🚀
        uses: JamesIves/github-pages-deploy-action@v4.6.4
        with:
          repository-name: "Roma-JS/roma-js.github.io"
          token: ${{ secrets.DEPLOY_TOKEN }}
          branch: "master" # The branch the action should deploy to.
          folder: dist
          clean: true
          clean-exclude: | # These files do not get wiped
            CNAME
